<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>FIFA WC 2026 — Game Master</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#050e1c;font-family:-apple-system,'Inter',sans-serif;color:#e8f0fe;min-height:100vh;padding-bottom:48px}
    input,button,textarea{font-family:inherit}
    button{cursor:pointer}
    input:focus,textarea:focus{outline:none}
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:#fff;font-size:12px;font-weight:700;padding:8px 18px;border-radius:20px;z-index:9999;pointer-events:none;display:none;transition:background 0.3s}
    .toast.show{display:block}
    .toast.syncing{background:#1a5080}
    .toast.saved{background:#007730}
    .toast.error{background:#cc3333}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:200;display:flex;align-items:flex-end}
    .modal-box{width:100%;background:#0b1f38;border-radius:20px 20px 0 0;border:1px solid #1a3050;padding:20px 16px 40px;max-height:92vh;overflow-y:auto;box-sizing:border-box}
    .hidden{display:none!important}
    ::-webkit-scrollbar{width:4px;height:4px}
    ::-webkit-scrollbar-thumb{background:#1a3050;border-radius:4px}
    #scorer-dropdown{position:fixed;background:#0b1f38;border:1px solid #1a3050;border-radius:10px;z-index:5000;max-height:180px;overflow-y:auto;box-shadow:0 8px 24px rgba(0,0,0,0.6);display:none}
    #scorer-dropdown div{padding:10px 14px;font-size:13px;color:#e8f0fe;border-bottom:1px solid #1a3050}
    #scorer-dropdown div:last-child{border-bottom:none}
    #scorer-dropdown div:active{background:#1a3050}
  </style>
</head>

  lsv("gm-scorers",S.scorers);lsv("gm-shootouts",S.shootouts);lsv("gm-sovotes",S.soVotes);lsv("gm-bonus",S.bonus);

function pushCloud(silent){
  const data={players:S.players,votes:S.votes,results:S.results,scorers:S.scorers,shootouts:S.shootouts,soVotes:S.soVotes,bonus:S.bonus};
  pendingCloudSave=false;
  fetch(BIN_URL,{method:"PUT",headers:{"Content-Type":"application/json","X-Access-Key":API_KEY},body:JSON.stringify(data)})
    .then(r=>{if(!silent)r.ok?toast("✅ Saved to cloud","saved"):toast("❌ Save failed","error");})
    .catch(()=>{if(!silent)toast("❌ No connection","error");});
}
function sv(cloudNow){
  saveLocal();
  pendingCloudSave=true;
  if(cloudNow){pushCloud();}else{toast("💾 Saved locally","syncing",1500);}
}

// Schedule a one-time push at each match's kick-off time
MATCHES.forEach(m=>{
  if(S.results[m.id]||!m.time||m.time==="TBD")return;
  const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const dp=m.day.split(" ");
  const tp=m.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!tp)return;
  let hr=parseInt(tp[1]),min=parseInt(tp[2]);
  if(tp[3].toUpperCase()==="PM"&&hr!==12)hr+=12;
  if(tp[3].toUpperCase()==="AM"&&hr===12)hr=0;
  const offset=m.time.includes("CST")?6:5;
  const kickoff=Date.UTC(2026,months[dp[1]],parseInt(dp[2]),hr+offset,min);
  const delay=kickoff-Date.now();
  if(delay>0)setTimeout(()=>{render();if(pendingCloudSave)pushCloud(true);},delay);
});

function applyCloud(d){
  if(!d)return;
  S.players=d.players||["","","","",""];
  S.votes=d.votes||{};S.results=d.results||{};S.scorers=d.scorers||{};
  S.shootouts=d.shootouts||{};S.soVotes=d.soVotes||{};S.bonus=d.bonus||{};
  lsv("gm-players",S.players);lsv("gm-votes",S.votes);lsv("gm-results",S.results);
  lsv("gm-scorers",S.scorers);lsv("gm-shootouts",S.shootouts);lsv("gm-sovotes",S.soVotes);lsv("gm-bonus",S.bonus);
}

async function syncCloud(){
  try{
    const r=await fetch(BIN_URL+"/latest",{headers:{"X-Access-Key":API_KEY}});
    const j=await r.json();
    const d=j.record;
    const cloudHasData=d&&(d.players||[]).some(p=>p.trim())||(Object.keys(d?.results||{}).length>0);
    if(cloudHasData){applyCloud(d);}
    else{sv();}// cloud empty — push local data up
    render();
  }catch(e){}
}

let _ddSquad=[],_ddMid="",_ddPi=0;
const _dd=()=>document.getElementById("scorer-dropdown");
function showScorerDropdown(el,mid,pi){
  _ddMid=mid;_ddPi=pi;
  _ddSquad=getSquad(MATCHES.find(m=>m.id===mid)||{home:"",away:""});
  filterScorerDropdown(el);
  el.addEventListener("input",()=>filterScorerDropdown(el),{once:false});
}
function filterScorerDropdown(el){
  const q=(el.value||"").toLowerCase().trim();
  const matches=_ddSquad.filter(p=>!q||p.toLowerCase().includes(q)).slice(0,8);
  const dd=_dd();
  if(!matches.length){dd.style.display="none";return;}
  const rect=el.getBoundingClientRect();
  dd.style.display="block";
  dd.style.left=rect.left+"px";
  dd.style.top=(rect.bottom+4)+"px";
  dd.style.width=rect.width+"px";
  dd.innerHTML=matches.map(p=>`<div onmousedown="pickScorer('${p.replace(/'/g,"\\'")}','${_ddMid}',${_ddPi})"ontouchstart="pickScorer('${p.replace(/'/g,"\\'")}','${_ddMid}',${_ddPi})">${p}</div>`).join("");
}
function pickScorer(name,mid,pi){
  setBonus(mid,pi,name);sv(true);
  const inputs=document.querySelectorAll(`input[data-bonus="${mid}-${pi}"]`);
  inputs.forEach(el=>el.value=name);
  _dd().style.display="none";
}

function matchStarted(m){
  if(S.results[m.id])return true;
  if(!m.time||m.time==="TBD")return false;
  const months={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
  const dp=m.day.split(" ");
  const mon=months[dp[1]],day=parseInt(dp[2]);
  const tp=m.time.match(/(\d+):(\d+)\s*(AM|PM)/i);
  if(!tp)return false;
  let hr=parseInt(tp[1]),min=parseInt(tp[2]);
  if(tp[3].toUpperCase()==="PM"&&hr!==12)hr+=12;
  if(tp[3].toUpperCase()==="AM"&&hr===12)hr=0;
  const offset=m.time.includes("CST")?6:5; // CST=UTC-6, CDT=UTC-5
  return Date.now()>=Date.UTC(2026,mon,day,hr+offset,min);
}

function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function parseScore(s){
  if(!s)return null;
  const m=String(s).trim().match(/^(\d+)\s*-\s*(\d+)$/);
  return m?{h:+m[1],a:+m[2]}:null;
}
function calcPts(pred,actual,so,bp,asc,soVote){
  const p=parseScore(pred),a=parseScore(actual);
  if(!p||!a)return{total:0,exact:false,winner:false,draw:false,bonus:false,soCorrect:false};
  let pts=0,exact=false,winner=false,draw=false,bonus=false,soCorrect=false;
  if(p.h===a.h&&p.a===a.a){pts+=5;exact=true;}
  else{
    const pw=p.h>p.a?"h":p.a>p.h?"a":"d";
    const aw=a.h>a.a?"h":a.a>a.h?"a":"d";
    if(pw===aw){if(pw==="d"){pts+=3;draw=true;}else{pts+=3;winner=true;}}
  }
  if(bp&&asc&&bp.trim().toLowerCase()===asc.trim().toLowerCase()){pts+=4;bonus=true;}
  if(so&&soVote&&soVote===so){pts+=2;soCorrect=true;}
  return{total:pts,exact,winner,draw,bonus,soCorrect};
}

function getLB(){
  return S.players.filter(p=>p.trim()).map((name,pi)=>{
    const bd=MATCHES.map(m=>{
      const pred=(S.votes[m.id]||{})[pi]||"";
      const actual=S.results[m.id]||"";
      const result=calcPts(pred,actual,S.shootouts[m.id]||"",(S.bonus[m.id]||{})[pi]||"",S.scorers[m.id]||"",(S.soVotes[m.id]||{})[pi]||"");
      return{match:m,pred,actual,result};
    });
    return{name,total:bd.reduce((s,b)=>s+b.result.total,0),bd};
  }).sort((a,b)=>b.total-a.total);
}

function rankIdx(lb,i){return lb.findIndex(p=>p.total===lb[i].total);}
function rankLbl(lb,i){const r=rankIdx(lb,i);return MEDAL[r]||"#"+(r+1);}
function rankClr(lb,i){const r=rankIdx(lb,i);return r===0?C.gold:r===1?"#c0c0c0":r===2?"#cd7f32":C.text;}

    <div style="background:${m.live?"#1a0808":C.card};border:1px solid ${m.live?C.red:C.border};border-radius:14px;overflow:hidden;margin-bottom:12px">
      <div style="padding:11px 13px;border-bottom:1px solid ${C.border};display:flex;justify-content:space-between;align-items:center">
        <div><div style="font-size:14px;font-weight:800">${m.hf} ${esc(m.home)} <span style="color:${C.muted};font-weight:400">vs</span> ${m.af} ${esc(m.away)}</div><div style="font-size:11px;color:${C.muted};margin-top:2px">⏰ ${m.time}${m.stage?" · "+m.stage:""}</div></div>
        ${m.live?`<span style="background:${C.red};color:#fff;font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px">● LIVE</span>`:""}
      </div>
      <div style="padding:11px 13px;background:#071520">
        <div style="font-size:10px;color:${C.gold};text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:6px">✅ GM enters after match</div>
        <div style="display:flex;gap:8px;margin-bottom:8px">
          ${isGM?`<input value="${esc(res)}" placeholder="Final score e.g. 2-1" oninput="setResult('${m.id}',this.value)" style="flex:1;padding:10px 12px;background:${C.dark};border:1px solid ${C.border};border-radius:9px;color:${C.text};font-size:13px"/>`:`<div style="flex:1;padding:10px 12px;background:${C.dark};border:1px solid ${C.border};border-radius:9px;color:${res?C.text:C.muted};font-size:13px">${res||"Awaiting result"}</div>`}
          ${isGM?`<input value="${esc(scorer)}" placeholder="⭐ First scorer" oninput="setScorer('${m.id}',this.value)" style="flex:1.5;padding:10px 12px;background:${C.dark};border:1px solid ${C.border};border-radius:9px;color:${C.text};font-size:13px"/>`:`<div style="flex:1.5;padding:10px 12px;background:${C.dark};border:1px solid ${C.border};border-radius:9px;color:${scorer?C.text:C.muted};font-size:13px">${scorer||"⭐ First scorer"}</div>`}
        </div>
        ${isDraw&&isGM?`<div style="font-size:10px;color:${C.gold};text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:6px">🥅 Penalty shootout winner</div><div style="display:flex;gap:8px"><button onclick="setShootout('${m.id}','h')" style="flex:1;padding:9px 0;border-radius:9px;border:${so==="h"?`2px solid ${C.green}`:`1px solid ${C.border}`};background:${so==="h"?C.green:C.dark};color:${so==="h"?"#fff":C.muted};font-size:12px;font-weight:700">${m.hf} ${esc(m.home)}</button><button onclick="setShootout('${m.id}','a')" style="flex:1;padding:9px 0;border-radius:9px;border:${so==="a"?`2px solid ${C.green}`:`1px solid ${C.border}`};background:${so==="a"?C.green:C.dark};color:${so==="a"?"#fff":C.muted};font-size:12px;font-weight:700">${m.af} ${esc(m.away)}</button></div>`:""}
      </div>
    </div>
    <div style="font-size:10px;color:${C.muted};text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:8px">Predictions</div>
    ${players_.length===0?`<div style="background:${C.dark};border:1px dashed ${C.border};border-radius:12px;padding:18px;text-align:center;color:${C.muted};font-size:13px">Add player names above first</div>`:players_.map((name,pi)=>{
      const pred=(S.votes[m.id]||{})[pi]||"";
      const bp=(S.bonus[m.id]||{})[pi]||"";
      const soVote=(S.soVotes[m.id]||{})[pi]||"";
      const actRes=res?calcPts(pred,res,so,bp,scorer,soVote):null;
      const pC=!actRes?C.muted:actRes.total>=5?C.gold:actRes.total>0?C.green:C.red;
      const ok=!pred||!!parseScore(pred);
      const locked=matchStarted(m)&&!isGM;
      const isMyRow=isGM||(myIdx===pi);
      const readOnly=!isMyRow||locked;
      return`<div style="background:${C.card};border:1px solid ${isMyRow&&!locked?C.green:C.border};border-radius:12px;padding:11px 13px;margin-bottom:8px;opacity:${isMyRow?1:0.6}">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span style="font-weight:700;font-size:14px">${esc(name)}${isMyRow&&!locked?" 👤":""}</span>${res&&!pred?`<span style="font-size:11px;color:${C.muted}">⏭️ Skipped — 0 pts</span>`:actRes?`<span style="font-size:13px;font-weight:900;color:${pC}">${actRes.total>0?`+${actRes.total} pts`:"0 pts"}</span>`:`<span style="font-size:11px;color:${C.muted}">${locked?"🔒 Locked":"awaiting result"}</span>`}</div>
        ${locked?`<div style="font-size:10px;color:#ff8866;margin-bottom:6px">${S.results[m.id]?"🔒 Match completed — predictions locked":"🔒 Match started — predictions locked"}</div>`:""}
        ${!isMyRow&&!locked?`<div style="font-size:10px;color:${C.muted};margin-bottom:6px">👁 View only</div>`:""}
        <div style="display:flex;gap:8px">
          <div style="flex:1"><div style="font-size:10px;color:${C.muted};margin-bottom:4px">Score prediction</div>${readOnly?`<div style="padding:10px 12px;background:${C.dark};border:1px solid ${C.border};border-radius:9px;color:${pred?C.text:C.muted};font-size:13px">${pred||"—"}</div>`:`<input id="score-${m.id}-${pi}" value="${esc(pred)}" placeholder="e.g. 2-1" oninput="handleScoreInput('${m.id}',${pi},this)" onblur="validateScoreBlur('${m.id}',${pi},this)" style="padding:10px 12px;background:${C.dark};border:1px solid ${pred&&!ok?"#ff6644":C.border};border-radius:9px;color:${C.text};font-size:13px;width:100%"/>${pred&&!ok?`<div style="font-size:10px;color:#ff8866;margin-top:3px">⚠️ Use format: 2-1</div>`:""}`}</div>
          <div style="flex:1"><div style="font-size:10px;color:${C.muted};margin-bottom:4px">⭐ First scorer</div>${readOnly?`<div style="padding:10px 12px;background:${C.dark};border:1px solid ${C.border};border-radius:9px;color:${bp?C.text:C.muted};font-size:13px">${bp||"—"}</div>`:`<input value="${esc(bp)}" placeholder="Tap to search..." data-bonus="${m.id}-${pi}" onfocus="showScorerDropdown(this,'${m.id}',${pi})" oninput="setBonus('${m.id}',${pi},this.value)" onblur="hideScorerDropdown()" style="padding:10px 12px;background:${C.dark};border:1px solid ${C.border};border-radius:9px;color:${C.text};font-size:13px;width:100%"/>`}</div>
        </div>
        ${isDraw&&!readOnly?`<div style="margin-top:8px"><div style="font-size:10px;color:${C.gold};font-weight:700;margin-bottom:5px">🥅 Penalty shootout winner? (+2pts)</div><div style="display:flex;gap:6px"><button onclick="setSoVote('${m.id}',${pi},'h')"style="flex:1;padding:8px 0;border-radius:9px;border:${soVote==='h'?`2px solid ${C.green}`:`1px solid ${C.border}`};background:${soVote==='h'?C.green:C.dark};color:${soVote==='h'?"#fff":C.muted};font-size:12px;font-weight:700">${m.hf} ${esc(m.home)}</button><button onclick="setSoVote('${m.id}',${pi},'a')" style="flex:1;padding:8px 0;border-radius:9px;border:${soVote==='a'?`2px solid ${C.green}`:`1px solid ${C.border}`};background:${soVote==='a'?C.green:C.dark};color:${soVote==='a'?"#fff":C.muted};font-size:12px;font-weight:700">${m.af} ${esc(m.away)}</button></div></div>`:""}
        ${isDraw&&locked&&soVote?`<div style="margin-top:6px;font-size:11px;color:${C.muted}">🥅 Shootout pick: ${soVote==="h"?m.hf+" "+esc(m.home):m.af+" "+esc(m.away)}</div>`:""}
        ${actRes&&pred?`<div style="font-size:11px;color:${pC};font-weight:600;margin-top:6px">${actRes.exact?"🎯 Exact score!":""}${actRes.winner?"✅ Correct winner":""}${actRes.draw?"🤝 Correct draw":""}${actRes.soCorrect?" + 🥅 Shootout!":""}${actRes.bonus?" + ⭐ Bonus scorer!":""}${actRes.total===0&&res?"❌ No points":""}</div>`:""}
      </div>`;
    }).join("")}
${MATCHES.some(m=>S.results[m.id])?`<button onclick="setView('board')" style="width:100%;margin-top:8px;padding:13px 0;background:linear-gradient(135deg,${C.green},${C.dkGreen});border:none;border-radius:12px;color:#fff;font-size:14px;font-weight:800">🏆 View leaderboard →</button>`:""}`;
}

function renderBoard(lb,hasResults){
  if(!hasResults)return`<div style="text-align:center;padding:40px 20px"><div style="font-size:32px;margin-bottom:10px">⏳</div><div style="color:${C.muted};font-size:14px;margin-bottom:16px">Enter a match result first</div><button onclick="setView('votes')" style="padding:10px 24px;background:${C.card};border:1px solid ${C.border};border-radius:10px;color:${C.sub};font-size:13px">← Back</button></div>`;
  const done=MATCHES.filter(m=>S.results[m.id]);
  const maxPts=lb[0]?.total||1;
  const byDay=done.reduce((acc,m)=>{(acc[m.day]=acc[m.day]||[]).push(m);return acc;},{});
  return`
    <div style="background:linear-gradient(145deg,#040c18,#0a1e35);border:2px solid ${C.gold};border-radius:20px;overflow:hidden;box-shadow:0 0 32px rgba(255,215,0,0.12);margin-bottom:12px">
      <div style="background:linear-gradient(135deg,#006622,#004416);padding:12px 20px 10px;text-align:center;border-bottom:2px solid ${C.gold}">
        <div style="font-size:9px;color:rgba(255,215,0,0.6);letter-spacing:3px;text-transform:uppercase">FIFA World Cup 2026</div>
        <div style="font-size:19px;font-weight:900;color:#fff;margin:2px 0">🏆 Total Leaderboard</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.45)">${done.length} match${done.length!==1?"es":""} played</div>
      </div>
      <div style="padding:7px 12px;border-bottom:1px solid ${C.border};background:#071525">
        ${(()=>{const daysWithResults=Object.keys(byDay);const ci=daysWithResults.indexOf(S.boardDay||S.day);const selDay=daysWithResults[ci>=0?ci:daysWithResults.length-1]||S.day;S.boardDay=selDay;const dayMs=byDay[selDay]||[];return`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px"><button onclick="S.boardDay=Object.keys({${Object.keys(byDay).map(d=>`'${d}':1`).join(',')}})[(${daysWithResults.indexOf(selDay)}-1+${daysWithResults.length})%${daysWithResults.length}];render()" style="background:none;border:none;color:${C.muted};font-size:16px;padding:2px 6px;cursor:pointer">◀</button><div style="font-size:9px;color:${C.gold};font-weight:700;text-transform:uppercase;letter-spacing:1px">${selDay}</div><button onclick="S.boardDay=Object.keys({${Object.keys(byDay).map(d=>`'${d}':1`).join(',')}})[(${daysWithResults.indexOf(selDay)}+1)%${daysWithResults.length}];render()" style="background:none;border:none;color:${C.muted};font-size:16px;padding:2px 6px;cursor:pointer">▶</button></div><div style="display:flex;gap:5px;flex-wrap:wrap">${dayMs.map(m=>`<div style="background:${C.card};border:1px solid ${C.border};border-radius:7px;padding:4px 9px;text-align:center"><div style="font-size:9px;color:${C.muted}">${m.hf} vs ${m.af}</div><div style="font-size:12px;font-weight:900;color:${C.gold};font-family:monospace">${S.results[m.id]}</div></div>`).join("")}</div>`;})()}
      </div>
      <div style="padding:9px 11px 12px">
        ${lb.map((p,idx)=>{
          const bar=(p.total/maxPts)*100;const top=rankIdx(lb,idx)===0;const nc=rankClr(lb,idx);
          const played=p.bd.filter(b=>b.actual);
          const exact=played.filter(b=>b.result.exact).length;
          const correct=played.filter(b=>b.result.winner||b.result.draw).length;
          const bonus=played.filter(b=>b.result.bonus).length;
          return`<div style="position:relative;overflow:hidden;margin-bottom:${idx<lb.length-1?7:0}px;background:${top?"rgba(255,215,0,0.07)":"rgba(255,255,255,0.02)"};border:1px solid ${top?"rgba(255,215,0,0.28)":C.border};border-radius:11px;padding:10px 12px"><div style="position:absolute;left:0;top:0;bottom:0;width:${bar}%;background:${top?"linear-gradient(90deg,rgba(255,215,0,0.09),transparent)":"linear-gradient(90deg,rgba(0,187,68,0.06),transparent)"};border-radius:11px"></div><div style="display:flex;align-items:center;gap:9px;position:relative"><div style="font-size:19px;min-width:24px;text-align:center;line-height:1">${rankLbl(lb,idx)}</div><div style="flex:1"><div style="font-weight:800;font-size:14px;color:${nc}">${esc(p.name)}</div><div style="font-size:10px;color:${C.muted};margin-top:3px">${played.length} played${exact?` &nbsp;🎯 ${exact}`:""}${correct?` &nbsp;✅ ${correct}`:""}${bonus?` &nbsp;⭐ ${bonus}`:""}</div></div><div style="text-align:right;flex-shrink:0"><div style="font-size:${top?24:18}px;font-weight:900;color:${nc};line-height:1">${p.total}</div><div style="font-size:8px;color:${C.muted}">pts</div></div></div></div>`;
        }).join("")}
      </div>
      <div style="padding:7px 12px 9px;border-top:1px solid ${C.border};background:#071525;display:flex;justify-content:space-around">
        ${[["🎯","Exact","5pts"],["✅","Winner","3pts"],["🤝","Draw","3pts"],["⭐","Scorer","4pts"]].map(([ic,l,pt])=>`<div style="text-align:center"><div style="font-size:13px">${ic}</div><div style="font-size:8px;color:${C.muted}">${l}</div><div style="font-size:9px;font-weight:800;color:${C.gold}">${pt}</div></div>`).join("")}
      </div>
    </div>
    <button onclick="setView('votes')" style="width:100%;padding:11px 0;background:transparent;border:1px solid ${C.border};border-radius:12px;color:${C.muted};font-size:13px">← Back to votes</button>`;
}

function setDay(day){S.day=day;S.match=MATCHES.find(m=>m.day===day)?.id;render();}
function setView(v){S.view=v;render();}
function setMatch(id){S.match=id;render();}
let renderTimer;
function debouncedRender(){clearTimeout(renderTimer);renderTimer=setTimeout(render,600);}

function setPlayer(i,v){S.players[i]=v;sv();ping();}
function addPlayer(){S.players.push("");sv();render();}
function handleScoreInput(mid,pi,el){
  const v=el.value;
  const valid=!v||!!parseScore(v);
  el.style.borderColor=valid?C.border:"#ff6644";
  if(valid){if(!S.votes[mid])S.votes[mid]={};S.votes[mid][pi]=v;sv(true);ping();}
}
function validateScoreBlur(mid,pi,el){
  const v=el.value.trim();
  if(v&&!parseScore(v)){
    el.style.borderColor="#ff6644";
    el.value=(S.votes[mid]||{})[pi]||"";
    el.style.borderColor=el.value?"":"";
    alert("Invalid score format. Please use format like 2-1 (home-away).");
  }
}
function setVote(mid,pi,v){if(!S.votes[mid])S.votes[mid]={};S.votes[mid][pi]=v;sv();ping();}
function setBonus(mid,pi,v){if(!S.bonus[mid])S.bonus[mid]={};S.bonus[mid][pi]=v;sv();ping();}
function setSoVote(mid,pi,v){if(!S.soVotes[mid])S.soVotes[mid]={};S.soVotes[mid][pi]=v;sv(true);ping();render();}
function setResult(mid,v){S.results[mid]=v;sv(true);ping();debouncedRender();}
function setScorer(mid,v){S.scorers[mid]=v;sv(true);ping();debouncedRender();}
function setShootout(mid,v){S.shootouts[mid]=v;sv(true);ping();render();}

render();
// Re-render when iOS Safari restores page from BFCache (back/forward navigation or tab reopen)
window.addEventListener("pageshow", e => { if(e.persisted) render(); });
</script>
</body>
</html>
